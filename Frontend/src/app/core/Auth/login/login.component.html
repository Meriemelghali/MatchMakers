<div class="login-page">
  
  <!-- Partie gauche : formulaire -->
  <div class="login-left">
    <div class="login-box">
      
      <!-- Logo + titre -->
      <div class="brand">
        <img src="assets/logo.png" alt="MatchMakers Logo" class="logo" />
      </div>

      <!-- Formulaire -->
      <form #loginForm="ngForm" (ngSubmit)="onLogin(loginForm)">
        
        <div class="input-group">
          <label>Email</label>
          <div class="input-wrapper">
            <span class="icon">✉</span>
            <input 
              type="email" 
              name="email" 
              ngModel 
              required 
              placeholder="votre@email.com" 
            />
          </div>
        </div>

        <div class="input-group">
          <label>Mot de passe</label>
          <div class="input-wrapper">
            <span class="icon">🔒</span>
            <input 
              [type]="showPassword ? 'text' : 'password'" 
              name="password" 
              ngModel 
              required 
              placeholder="••••••••" 
            />
            <span class="toggle-eye" (click)="togglePassword()">
              <svg *ngIf="!showPassword" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="cursor: pointer;"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
              <svg *ngIf="showPassword" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ff6a00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="cursor: pointer;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
            </span>
          </div>
        </div>

        <div class="options">
          <label class="remember">
            <input type="checkbox" /> Se souvenir de moi
          </label>
          <a routerLink="/forgot-password" class="forgot">Mot de passe oublié?</a>
        </div>

        <button type="submit" [disabled]="loading" class="btn-login">
          {{ loading ? 'Connexion...' : 'Se connecter →' }}
        </button>

        <div *ngIf="errorMessage" class="error">{{ errorMessage }}</div>

        <p class="register-link">
          Pas encore de compte? <a routerLink="/register">Créer un compte</a>
        </p>

      </form>
    </div>
  </div>

  <!-- Partie droite : image -->
  <div class="login-right">
    <div class="overlay">
      <h2>Rejoignez la communauté sportive</h2>
      <p>Créez votre profil, constituez vos équipes et organisez vos matchs en quelques clics.</p>
    </div>
  </div>

</div>
