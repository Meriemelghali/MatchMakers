<div class="login-page">
  <div class="login-left">
    <div class="login-box">
      <div class="brand">
        <img src="assets/logo.png" alt="MatchMakers Logo" class="logo" />
        <h3 class="auth-title">Mot de passe oublié</h3>
        <p class="auth-subtitle">Saisissez votre e-mail pour recevoir les instructions.</p>
      </div>

      <form #forgotForm="ngForm" (ngSubmit)="onSubmit(forgotForm)">
        <div class="input-group">
          <label>Email</label>
          <div class="input-wrapper">
            <span class="icon">✉</span>
            <input type="email" name="email" ngModel required placeholder="votre@email.com" />
          </div>
        </div>

        <button type="submit" [disabled]="loading || forgotForm.invalid" class="btn-login">
          {{ loading ? 'Envoi en cours...' : 'Envoyer le lien →' }}
        </button>

        <div *ngIf="successMessage" class="success-message">{{ successMessage }}</div>
        <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>

        <p class="register-link">
          <a routerLink="/login">← Retour à la connexion</a>
        </p>
      </form>
    </div>
  </div>

  <div class="login-right">
    <div class="overlay">
      <h2>Ne perdez pas le contact</h2>
      <p>Récupérez votre accès et continuez à organiser vos matchs avec votre communauté.</p>
    </div>
  </div>
</div>
