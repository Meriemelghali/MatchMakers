<div class="login-page">
  <div class="login-left">
    <div class="login-box">
      <div class="brand">
        <img src="assets/logo.png" alt="MatchMakers Logo" class="logo" />
        <h3 class="auth-title">Nouveau mot de passe</h3>
        <p class="auth-subtitle">Saisissez votre nouveau mot de passe ci-dessous.</p>
      </div>

      <form #resetForm="ngForm" (ngSubmit)="onSubmit(resetForm)">
        
        <div class="input-group">
          <label>Nouveau mot de passe</label>
          <div class="input-wrapper">
            <span class="icon">🔒</span>
            <input
              [type]="showPassword ? 'text' : 'password'"
              name="password"
              ngModel
              required
              placeholder="••••••••"
            />
            <span class="eye-icon" (click)="togglePassword()">
              <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                viewBox="0 0 24 24" fill="none" stroke="#ff6a00" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </span>
          </div>
        </div>

        <div class="input-group">
          <label>Confirmer le mot de passe</label>
          <div class="input-wrapper">
            <span class="icon">🔒</span>
            <input
              [type]="showConfirmPassword ? 'text' : 'password'"
              name="confirmPassword"
              ngModel
              required
              placeholder="••••••••"
            />
            <span class="eye-icon" (click)="toggleConfirmPassword()">
              <svg *ngIf="!showConfirmPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg *ngIf="showConfirmPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                viewBox="0 0 24 24" fill="none" stroke="#ff6a00" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </span>
          </div>
        </div>

        <button type="submit" [disabled]="loading || resetForm.invalid" class="btn-login">
          {{ loading ? 'Enregistrement...' : 'Mettre à jour →' }}
        </button>

        <div *ngIf="successMessage" class="success-message">{{ successMessage }}</div>
        <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>

        <p class="register-link">
          <a routerLink="/login">← Retour à la connexion</a>
        </p>

      </form>
    </div>
  </div>

  <div class="login-right">
    <div class="overlay">
      <h2>Sécurisez votre profil</h2>
      <p>Choisissez un mot de passe robuste et unique pour protéger votre compte sur MatchMakers.</p>
    </div>
  </div>
</div>
