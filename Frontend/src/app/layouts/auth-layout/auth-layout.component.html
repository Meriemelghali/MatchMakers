<!-- Mobile Header (Hidden on Desktop) -->
<div class="mob-header">
  <a routerLink="/" class="mob-brand">
    <img src="assets/logo.png" alt="Logo" width="32" height="32" style="border-radius: 8px;">
    <div class="mob-brand-text"><span>Match</span><span style="color:var(--brand)">Makers</span></div>
  </a>
  <button class="mob-burger" (click)="navOpen = !navOpen" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</div>

<!-- Elite Left Sidebar (Sofascore Pro Dashboard Style) -->
<nav class="sidebar" [class.sidebar-open]="navOpen">
  <div class="sidebar-inner">

    <!-- Brand (Non-clickable) -->
    <div class="sidebar-brand">
      <div class="sidebar-logo-container">
        <img src="assets/logo.png" alt="Logo" width="30" height="30" style="border-radius: 6px;">
      </div>
      <div class="sidebar-brand-text">
        <span class="brand-name">MATCH<b>MAKERS</b></span>
      </div>
    </div>

    <!-- Links -->
    <div class="sidebar-links">
      <div class="sidebar-label">GESTION SPORTIVE</div>
      <a *ngFor="let link of navLinks" [routerLink]="link.path" routerLinkActive="sidebar-link-active"
        class="sidebar-link" (click)="navOpen = false">
        <span [innerHTML]="link.icon" class="sidebar-link-icon"></span>
        {{ link.label }}
      </a>
    </div>

    <!-- Clock / Bottom Meta -->
<div class="sidebar-bottom">

  <!-- Profile wrapper -->
  <div class="profile-wrapper">

    <!-- Profile card -->
    <div class="profile-card"
         (click)="profileOpen = !profileOpen; $event.stopPropagation()">

      <div class="avatar-wrap">
        <div class="avatar-initials">{{ userInitials }}</div>
        <div class="online-dot"></div>
      </div>

      <div class="profile-text">
        <div class="profile-welcome">Welcome,</div>
        <div class="profile-name">{{ userName || '[Connecté]' }}</div>
        <div class="profile-role">{{ userRole }}</div>
      </div>

    </div>

    <!-- Dropdown -->
    <div class="profile-dropdown" *ngIf="profileOpen" [style.bottom]="getDropdownBottom()">

      <div class="dd-item avail-result">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Mon Profil
      </div>

      <div class="dd-item" *ngIf="isAdmin" (click)="goToBackoffice()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        Aller au Backoffice
      </div>

      <div class="dd-sep"></div>

      <div class="dd-item danger" (click)="logout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Se déconnecter
      </div>

    </div>

  </div>

  <div class="sidebar-clock">{{ now | date:'HH:mm' }}</div>
  <div style="font-size:10px; color:var(--text-3); margin-top:4px">Tunis, TN</div>

</div>

  </div>
</nav>

<!-- Main App Content -->
<main class="main-content">
  <router-outlet></router-outlet>
</main>
