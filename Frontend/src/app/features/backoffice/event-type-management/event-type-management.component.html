<div class="et-container">
  <div class="et-header">
    <div class="header-main">
      <h1>Gestion des Types d'Événements</h1>
      <p class="subtitle">Configurez les formats de jeux et de compétitions avec l'aide de l'IA</p>
    </div>
    <button class="btn-primary" (click)="openCreateForm()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Nouveau Type
    </button>
  </div>

  <div class="et-content" [class.with-sidebar]="showForm">
    <!-- Liste des Types -->
    <div class="et-list-card">
      <table class="et-table">
        <thead>
          <tr>
            <th>TYPE</th>
            <th>DESCRIPTION</th>
            <th>PROPRIÉTÉS</th>
            <th>ACTIONS</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let type of eventTypes" [class.active]="currentType.id === type.id">
            <td>
              <div class="type-info">
                <span class="type-icon">{{ type.icon || (type.isCompetition ? '🏆' : '🤝') }}</span>
                <span class="type-name">{{ type.typeName }}</span>
              </div>
            </td>
            <td class="type-desc">{{ type.description }}</td>
            <td>
              <div class="props-badges">
                <span class="badge" *ngIf="type.isCompetition" title="Compétition">🏆</span>
                <span class="badge" *ngIf="type.requiresTeams" title="Équipes requises">👥</span>
                <span class="badge" *ngIf="type.requiresMatches" title="Génère des matchs">⚔️</span>
              </div>
            </td>
            <td>
              <div class="et-actions">
                <button class="btn-icon" (click)="editType(type)" title="Modifier">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                </button>
                <button class="btn-icon delete" (click)="deleteType(type.id!)" title="Supprimer">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Sidebar de Création/Edition Assistée -->
    <div class="et-sidebar" *ngIf="showForm">
      <div class="sidebar-header">
        <h3>{{ isEditing ? 'Modifier' : 'Créer' }} un Type</h3>
        <button class="btn-close" (click)="showForm = false">×</button>
      </div>

      <div class="sidebar-body">
        <div class="field">
          <label>NOM DU TYPE</label>
          <div class="input-with-ai">
            <input type="text" [(ngModel)]="currentType.typeName" placeholder="Ex: Tournoi Pro, Match Amical...">
            <button class="ai-btn" (click)="generateWithAI()" [disabled]="aiLoading || !currentType.typeName" title="Générer tout avec l'IA">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m12 3 1.912 5.886L20 10.8l-5.886 1.912L12 18.6l-1.912-5.886L4 10.8l5.886-1.912L12 3z"/></svg>
            </button>
          </div>
        </div>

        <div class="field">
          <label>ICÔNE (Emoji)</label>
          <div class="input-with-ai">
            <input type="text" [(ngModel)]="currentType.icon" style="font-size: 1.5rem; width: 60px; text-align: center;">
            <button class="ai-btn" (click)="generateIconOnly()" [disabled]="aiLoading || !currentType.typeName" title="Suggérer une icône">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
            </button>
          </div>
        </div>

        <div class="field">
          <label>DESCRIPTION</label>
          <div class="input-with-ai">
            <textarea [(ngModel)]="currentType.description" rows="3" placeholder="Description du format..."></textarea>
            <button class="ai-btn description-btn" (click)="generateDescriptionOnly()" [disabled]="aiLoading || !currentType.typeName" title="Améliorer la description">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m12 3 1.912 5.886L20 10.8l-5.886 1.912L12 18.6l-1.912-5.886L4 10.8l5.886-1.912L12 3z"/><path d="M5 3v4M3 5h4M19 17v4M17 19h4"/></svg>
            </button>
          </div>
        </div>

        <div class="checkbox-group">
          <label class="cb-label">
            <input type="checkbox" [(ngModel)]="currentType.isCompetition"> C'est une compétition (Automatisée)
          </label>
          <label class="cb-label">
            <input type="checkbox" [(ngModel)]="currentType.requiresTeams"> Nécessite des équipes
          </label>
          <label class="cb-label">
            <input type="checkbox" [(ngModel)]="currentType.requiresMatches"> Génère des matchs
          </label>
        </div>

      </div>

      <div class="sidebar-footer">
        <button class="btn-secondary" (click)="showForm = false">Annuler</button>
        <button class="btn-primary" (click)="saveType()" [disabled]="!currentType.typeName">
          Enregistrer
        </button>
      </div>
    </div>
  </div>
</div>
