apiVersion: apps/v1
kind: Deployment
metadata:
  name: reservation-service
  labels:
    app: reservation-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reservation-service
  template:
    metadata:
      labels:
        app: reservation-service
    spec:
      containers:
      - name: reservation-service
        image: matchmakers-reservation-service:latest
        imagePullPolicy: Never # Très important pour Minikube pour utiliser l'image locale
        ports:
        - containerPort: 8089
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: dev
---
apiVersion: v1
kind: Service
metadata:
  name: reservation-service
spec:
  type: NodePort
  selector:
    app: reservation-service
  ports:
    - port: 8089
      targetPort: 8089
      nodePort: 30089
