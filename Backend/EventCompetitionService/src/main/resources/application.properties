spring.application.name=EventCompetitionService

server.port=8083
server.servlet.context-path=/eventsCompetitions

# IMPORTANT: do not commit credentials. Configure via env var for Atlas; defaults to local MongoDB for dev.
spring.data.mongodb.uri=${MONGODB_URI_EVENTS:mongodb://localhost:27017/eventsCompetitionsdb}
spring.data.mongodb.auto-index-creation=true
