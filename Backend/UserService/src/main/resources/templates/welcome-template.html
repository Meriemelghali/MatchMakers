<!-- fichier: welcome-template.html -->
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Bienvenue chez MatchMakers</title>
    <style>
        /* Corps du mail */
        body {
            font-family: Arial, sans-serif;
            background-color: #000000; /* noir */
            margin: 0;
            padding: 20px;
        }

        /* Conteneur principal */
        .container {
            max-width: 600px;
            margin: auto;
            background-color: #1a1a1a; /* gris foncé */
            border-radius: 10px;
            padding: 30px;
            color: #ffffff;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.3);
            text-align: center;
        }

        /* Logo */
        .logo {
            width: 150px;
            margin-bottom: 20px;
        }

        /* Titres */
        h1 {
            color: #FF6600; /* orange vif */
            font-size: 28px;
            margin-bottom: 15px;
        }

        /* Paragraphes */
        p {
            font-size: 16px;
            color: #e0e0e0;
            line-height: 1.6;
        }

        /* Bouton CTA */
        a.button {
            display: inline-block;
            padding: 12px 25px;
            background-color: #FF6600;
            color: #ffffff;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            margin-top: 20px;
            transition: background-color 0.3s ease;
        }

        a.button:hover {
            background-color: #e55b00;
        }

        /* Footer */
        .footer {
            font-size: 12px;
            color: #999999;
            margin-top: 25px;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Logo -->
    <img class="logo" src="https://raw.githubusercontent.com/Meriemelghali/MatchMakers/main/Frontend/src/assets/logo.png" alt="Logo MatchMakers">

    <h1>Bienvenue {{prenom}} !</h1>
    <p>Ton compte a été créé avec succès sur MatchMakers 🎉</p>
    <p>Voici ton email : <strong>{{email}}</strong></p>
    <p>Nous sommes ravis de t'avoir parmi nous !</p>
    <a href="#" class="button">Accéder à ton compte</a>
    <div class="footer">© 2026 MatchMakers. Tous droits réservés.</div>
</div>
</body>
</html>
