spring.application.name=ReclamationService

server.port=8082
server.servlet.context-path=/reclamations

# IMPORTANT: do not commit credentials. Configure via env var for Atlas; defaults to local MongoDB for dev.
spring.data.mongodb.uri=${MONGODB_URI_RECLAMATIONS:mongodb://localhost:27017/reclamationsdb}
spring.data.mongodb.auto-index-creation=true
