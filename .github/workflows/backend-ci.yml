name: Backend CI Pipeline

on:
  push:
    branches: [ "main", "master", "dev" ]
    paths:
      - 'Backend/**'
  pull_request:
    branches: [ "main", "master", "dev" ]
    paths:
      - 'Backend/**'

jobs:
  build:
    name: Build Backend Services
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        service: 
          - EventCompetitionService
          - SponsorService
          - MatchService
          - ProductService
          - ReclamationService
          - ReservationService
          - RewardService
          - SocialService
          - SportService
          - TeamService
          - TerrainService
          - UserService

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        working-directory: ./Backend/${{ matrix.service }}
        run: mvn clean package -DskipTests
        
      # Optionnel: Vous pouvez décommenter ces lignes si vous souhaitez que le pipeline construise aussi les images Docker
